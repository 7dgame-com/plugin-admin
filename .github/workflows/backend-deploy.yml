name: Backend Deploy

on:
  push:
    branches: [main, develop, publish]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/backend-deploy.yml"

env:
  REGISTRY: hkccr.ccs.tencentyun.com
  IMAGE: hkccr.ccs.tencentyun.com/plugins/system-admin-backend

jobs:
  build-and-push:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TENCENT_REGISTRY_USER }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=publish,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}

      - name: Set build metadata
        id: build-meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
